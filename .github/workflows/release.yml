name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.0.0). Leave empty to auto-generate.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-sc:
    name: Build self-contained
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - shell: pwsh
        run: .\scripts\build-dist.ps1 -SelfContained
      - uses: actions/upload-artifact@v4
        with:
          name: fbox-sc
          path: dist\fbox-dist.zip

  build-fd:
    name: Build framework-dependent
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - shell: pwsh
        run: .\scripts\build-dist.ps1 -SelfContained:$false
      - uses: actions/upload-artifact@v4
        with:
          name: fbox-fd
          path: dist\fbox-dist.zip

  release:
    name: Create Release
    needs: [build-sc, build-fd]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Diagnostic - file sizes
        shell: pwsh
        run: Get-ChildItem -Recurse artifacts | ForEach-Object { Write-Host "$($_.Length) $($_.Name)" }

      - name: Determine tag
        id: tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.version }}".Trim()
          if (-not $tag) { $tag = "v$(Get-Date -Format 'yyyy.MM.dd.HHmm')" }
          "tag=$tag" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          Move-Item artifacts\fbox-sc\fbox-dist.zip fbox-$tag-self-contained.zip
          Move-Item artifacts\fbox-fd\fbox-dist.zip fbox-$tag-framework-dependent.zip
          gh release create $tag --title $tag --notes "**self-contained**: 不需 .NET 运行时`n**framework-dependent**: 需安装 .NET 9.0" -- fbox-$tag-self-contained.zip fbox-$tag-framework-dependent.zip