name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.0.0). Leave empty to auto-generate.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build (self-contained)
        shell: pwsh
        run: |
          & .\scripts\build-dist.ps1 -SelfContained
          Move-Item dist fbox-sc

      - name: Clean build cache
        shell: pwsh
        run: Get-ChildItem -Path src -Directory -Recurse | Where-Object { $_.Name -in 'bin','obj' } | Remove-Item -Recurse -Force

      - name: Build (framework-dependent)
        shell: pwsh
        run: |
          & .\scripts\build-dist.ps1 -SelfContained:$false
          Move-Item dist fbox-fd

      - name: Determine tag
        id: tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.version }}".Trim()
          if (-not $tag) { $tag = "v$(Get-Date -Format 'yyyy.MM.dd.HHmm')" }
          "tag=$tag" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          Rename-Item fbox-sc\fbox-dist.zip fbox-$tag-sc.zip
          Rename-Item fbox-fd\fbox-dist.zip fbox-$tag-fd.zip
          gh release create $tag --title $tag --notes "**self-contained**: 不需 .NET 运行时`n**framework-dependent**: 需安装 .NET 9.0" -- fbox-sc\fbox-$tag-sc.zip fbox-fd\fbox-$tag-fd.zip
